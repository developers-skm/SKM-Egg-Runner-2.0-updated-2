    <script>
      // Register the app shell / offline cache service worker only.
      // The FCM messaging SW (firebase-messaging-sw.js) is registered separately
      // by PushNotificationService on its own scope (/firebase-cloud-messaging-push-scope)
      // so the two workers never conflict with each other.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function() {});
        });
      }
    </script>
  </body>
